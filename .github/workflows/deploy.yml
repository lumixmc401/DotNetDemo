name: Deploy to Azure AKS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Build project
      run: dotnet build --configuration Release
    
    - name: Run tests
      run: dotnet test --configuration Release --no-build
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get ACR Login Server
      id: acr
      run: |
        LOGIN_SERVER=$(az acr show --name ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }} --query loginServer --output tsv)
        echo "login_server=$LOGIN_SERVER" >> $GITHUB_OUTPUT
    
    - name: Build Docker image
      run: docker build -t ${{ steps.acr.outputs.login_server }}/dotnetdemo:${{ github.sha }} .
    
    - name: Push to Azure Container Registry
      run: |
        az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}
        docker push ${{ steps.acr.outputs.login_server }}/dotnetdemo:${{ github.sha }}
    
    - name: Deploy to AKS
      run: |
        RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"
        AKS_CLUSTER="${{ secrets.AZURE_AKS_CLUSTER_NAME }}"
        IMAGE="${{ steps.acr.outputs.login_server }}/dotnetdemo:${{ github.sha }}"
        az aks get-credentials --resource-group "$RESOURCE_GROUP" --name "$AKS_CLUSTER"
        kubectl set image deployment/dotnetdemo dotnetdemo="$IMAGE" -n default
