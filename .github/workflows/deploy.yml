name: Deploy to Azure AKS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Build project
      run: dotnet build --configuration Release
    
    - name: Run tests
      run: dotnet test --configuration Release --no-build
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get ACR Login Server
      id: acr
      run: |
        LOGIN_SERVER=$(az acr show --name ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }} --query loginServer --output tsv)
        echo "login_server=$LOGIN_SERVER" >> $GITHUB_OUTPUT
    
    - name: Set up QEMU for cross-platform build
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker
    
    - name: Build Docker image for ARM64
      run: docker build --platform linux/arm64 -t dotnetdemo:${{ github.sha }} .
    
    - name: Login and Push to ACR
      run: |
        az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}
        docker tag dotnetdemo:${{ github.sha }} ${{ steps.acr.outputs.login_server }}/dotnetdemo:${{ github.sha }}
        docker tag dotnetdemo:${{ github.sha }} ${{ steps.acr.outputs.login_server }}/dotnetdemo:latest
        docker push ${{ steps.acr.outputs.login_server }}/dotnetdemo:${{ github.sha }}
        docker push ${{ steps.acr.outputs.login_server }}/dotnetdemo:latest
    
    - name: Deploy to AKS
      run: |
        RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"
        AKS_CLUSTER="${{ secrets.AZURE_AKS_CLUSTER_NAME }}"
        IMAGE="${{ steps.acr.outputs.login_server }}/dotnetdemo:${{ github.sha }}"
        
        # Get AKS credentials
        az aks get-credentials --resource-group "$RESOURCE_GROUP" --name "$AKS_CLUSTER"
        
        # Check if deployment exists
        if kubectl get deployment dotnetdemo -n default &> /dev/null; then
          echo "Deployment exists, updating image..."
          kubectl set image deployment/dotnetdemo dotnetdemo="$IMAGE" -n default
        else
          echo "Deployment does not exist, creating from k8s manifests..."
          # Update the image in deployment.yaml before applying
          sed "s|image: dotnetdemo:latest|image: $IMAGE|g" k8s/deployment.yaml | kubectl apply -f -
        fi
        
        # Wait for rollout to complete
        kubectl rollout status deployment/dotnetdemo -n default
